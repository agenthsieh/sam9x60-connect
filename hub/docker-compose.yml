# SAM9X60 Connect — NAS Hub
#
#   cp .env.example .env      # pick a transport (see below), then:
#   docker compose up -d --build
#   open http://<nas-ip>:8091/
#
# Transport (set ONE in .env):
#   SERIAL_DEV=/dev/ttyACM0   USB-serial (CDC-ACM) — preferred; board data never
#                             touches Wi-Fi. Needs the device mapping + root
#                             below (the CDC-ACM node is root-owned on the host).
#   BOARD_HOST=<ip>           HTTP poll over the LAN (fallback). Then you can drop
#                             the `devices:` and `user:` lines.
services:
  hub:
    build: .
    image: sam9x60-hub:latest
    container_name: sam9x60-hub
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined      # Synology's kernel rejects Docker's seccomp profile
    user: "0:0"                 # read the root-owned /dev/ttyACM0 (serial mode)
    devices:
      - "${SERIAL_DEV:-/dev/ttyACM0}:${SERIAL_DEV:-/dev/ttyACM0}"
    ports:
      - "${HUB_PORT:-8091}:8091"
    environment:
      SERIAL_DEV: "${SERIAL_DEV:-/dev/ttyACM0}"
      BOARD_HOST: "${BOARD_HOST:-}"
      BOARD_PORT: "${BOARD_PORT:-8080}"
      INSTALLER_PORT: "${INSTALLER_PORT:-8090}"
      POLL_INTERVAL: "${POLL_INTERVAL:-3}"
      STALE_AFTER: "${STALE_AFTER:-8}"
      HUB_PORT: "8091"
